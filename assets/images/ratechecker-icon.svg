<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#e8f4ee"/>

  <!-- Card -->
  <rect x="140" y="110" width="744" height="804" rx="18" fill="white" stroke="#1a7a4a" stroke-width="6"/>

  <!-- Title -->
  <text x="512" y="248" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="100" fill="#1a7a4a" text-anchor="middle">Rate</text>
  <text x="512" y="358" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="100" fill="#1a7a4a" text-anchor="middle">Checker</text>

  <!-- Subtitle -->
  <text x="512" y="412" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#5a9c75" text-anchor="middle">SwiftUI · Core ML · WidgetKit</text>

  <!-- Divider -->
  <line x1="220" y1="440" x2="804" y2="440" stroke="#b8e0c8" stroke-width="2"/>

  <!-- Rate bar: label -->
  <text x="230" y="488" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#888" font-weight="700">YOUR BANK</text>
  <rect x="230" y="498" width="160" height="18" rx="9" fill="#d0e8da"/>

  <text x="230" y="550" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1a7a4a" font-weight="700">T-BILL</text>
  <rect x="230" y="560" width="440" height="18" rx="9" fill="#1a7a4a"/>

  <text x="230" y="612" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#888" font-weight="700">HYSA</text>
  <rect x="230" y="622" width="360" height="18" rx="9" fill="#5a9c75"/>

  <!-- Gap label -->
  <text x="230" y="685" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#1a7a4a" font-weight="700">You're leaving <tspan font-size="30" fill="#c0392b">$450/yr</tspan> on the table.</text>

  <!-- Widget pill -->
  <rect x="230" y="716" width="210" height="44" rx="22" fill="#1a7a4a"/>
  <text x="335" y="744" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="700">T-Bill: 5.12%</text>

  <!-- Green accent circle -->
  <circle cx="512" cy="838" r="52" fill="#1a7a4a" stroke="#0f5c35" stroke-width="3"/>
  <!-- Chart line icon -->
  <polyline points="482,858 498,830 514,848 530,820 542,838" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
