<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#e8f2fa"/>

  <!-- Card -->
  <rect x="140" y="110" width="744" height="804" rx="18" fill="white" stroke="#0076B6" stroke-width="6"/>

  <!-- Title -->
  <text x="512" y="248" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="86" fill="#0076B6" text-anchor="middle">Detroit</text>
  <text x="512" y="346" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="86" fill="#0076B6" text-anchor="middle">Sports</text>

  <!-- Subtitle -->
  <text x="512" y="404" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#5a9ec0" text-anchor="middle">AI Chatbot</text>

  <!-- Divider -->
  <line x1="220" y1="432" x2="804" y2="432" stroke="#b8ddf0" stroke-width="2"/>

  <!-- Chat input bar -->
  <rect x="210" y="454" width="604" height="70" rx="35" fill="white" stroke="#b8ddf0" stroke-width="2.5"/>
  <text x="370" y="497" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#9ab8cc">Ask about Detroit sports...</text>
  <!-- Send button -->
  <circle cx="768" cy="489" r="27" fill="#0076B6"/>
  <polygon points="768,474 757,504 779,504" fill="white"/>

  <!-- AI response bubble -->
  <rect x="210" y="548" width="500" height="112" rx="20" fill="#e8f2fa"/>
  <!-- Bubble tail -->
  <polygon points="232,660 212,694 266,660" fill="#e8f2fa"/>
  <!-- Text line placeholders -->
  <rect x="242" y="576" width="380" height="16" rx="8" fill="#b8ddf0"/>
  <rect x="242" y="606" width="300" height="16" rx="8" fill="#b8ddf0"/>
  <rect x="242" y="636" width="220" height="16" rx="8" fill="#b8ddf0"/>

  <!-- Tool label pill -->
  <rect x="210" y="712" width="240" height="34" rx="17" fill="#0076B6" opacity="0.12"/>
  <text x="330" y="734" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0076B6" text-anchor="middle" font-weight="700">get_scoreboard &#x2192;</text>

  <!-- Blue accent circle (Lions blue) -->
  <circle cx="512" cy="832" r="52" fill="#0076B6" stroke="#005a8a" stroke-width="3"/>
  <!-- Star for AI -->
  <text x="512" y="854" font-family="Arial, Helvetica, sans-serif" font-size="44" fill="white" text-anchor="middle">&#9733;</text>
</svg>
